name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Confirm dist/ structure
        run: |
          test -f dist/index.js
          test -f dist/networks.js
          test -f dist/tools/build.js
          test -f dist/tools/bridge.js
          head -n1 dist/index.js | grep -q '^#!'

  integration:
    name: integration (testnet3 + localnet)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: foundry-rs/foundry-toolchain@v1
      - run: npm ci
      - run: npm run build

      - name: Start anvil localnet
        run: |
          anvil --port 8546 --chain-id 2345 --silent &
          echo $! > anvil.pid
          # wait for RPC
          for i in $(seq 1 30); do
            if curl -s -m 1 -X POST http://127.0.0.1:8546 \
              -H 'content-type: application/json' \
              -d '{"jsonrpc":"2.0","id":1,"method":"eth_chainId","params":[]}' \
              | grep -q '"result"'; then
              echo "anvil ready"
              break
            fi
            sleep 0.5
          done
          # seed one tx so the harness can bootstrap a real txHash
          curl -s -X POST http://127.0.0.1:8546 \
            -H 'content-type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"eth_sendTransaction","params":[{"from":"0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266","to":"0x70997970c51812dc3a010c7d01b50e0d17dc79c8","value":"0xde0b6b3a7640000"}]}' \
            > /dev/null

      - name: Battle test — testnet3
        env:
          GOAT_NETWORK: testnet3
        run: node test-battle.mjs

      - name: Battle test — localnet
        env:
          GOAT_RPC_URL: http://127.0.0.1:8546
        run: node test-battle.mjs

      - name: Stop anvil
        if: always()
        run: kill $(cat anvil.pid) 2>/dev/null || true
